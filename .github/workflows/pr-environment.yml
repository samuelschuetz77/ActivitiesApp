name: PR Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-environment-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
  API_IMAGE: ${{ secrets.DOCKER_USERNAME }}/activitiesapp-api
  WEB_IMAGE: ${{ secrets.DOCKER_USERNAME }}/activitiesapp-web
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  prepare:
    name: Prepare
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute SHA tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'NuGet.Config', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Lint API
        run: dotnet format --verify-no-changes src/ActivitiesApp.Api/ActivitiesApp.Api.csproj

      - name: Lint Web
        run: dotnet format --verify-no-changes src/ActivitiesApp.Web/ActivitiesApp.Web.csproj

  test:
    name: Test
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'NuGet.Config', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Run API unit tests
        run: dotnet test tests/ActivitiesApp.Api.Tests/ActivitiesApp.Api.Tests.csproj --configuration Release --verbosity normal

      - name: Run Infrastructure unit tests
        run: dotnet test tests/ActivitiesApp.Infrastructure.Tests/ActivitiesApp.Infrastructure.Tests.csproj --configuration Release --verbosity normal

  push-api:
    name: Push API Image
    if: github.event.action != 'closed'
    needs: [prepare, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ActivitiesApp.Api/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ needs.prepare.outputs.sha_tag }}
          cache-from: type=gha,scope=activitiesapp-api
          cache-to: type=gha,mode=max,scope=activitiesapp-api

  push-web:
    name: Push Web Image
    if: github.event.action != 'closed'
    needs: [prepare, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ActivitiesApp.Web/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ needs.prepare.outputs.sha_tag }}
          cache-from: type=gha,scope=activitiesapp-web
          cache-to: type=gha,mode=max,scope=activitiesapp-web

  deploy:
    name: Deploy PR Environment
    if: github.event.action != 'closed'
    needs: [prepare, push-api, push-web]
    runs-on: self-hosted
    env:
      SHA_TAG: ${{ needs.prepare.outputs.sha_tag }}
      NAMESPACE: activitiesapp-pr-${{ github.event.pull_request.number }}
      PR_HOST: pr-${{ github.event.pull_request.number }}.activor.duckdns.org
    steps:
      - uses: actions/checkout@v4

      - name: Set KUBECONFIG
        run: echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Verify cluster access
        run: kubectl get nodes

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Register redirect URI with Azure AD
        run: |
          set -euo pipefail

          NEW_URI="https://${{ env.PR_HOST }}/signin-oidc"
          APP_ID="6d3dc4ee-33ce-4656-95c8-702a38464687"
          export NEW_URI

          TOKEN_RESPONSE=$(curl -sS -X POST \
            "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            -d "client_id=${{ secrets.AZURE_CI_CLIENT_ID }}&client_secret=${{ secrets.AZURE_CLIENT_SECRET_CI }}&scope=https://graph.microsoft.com/.default&grant_type=client_credentials")
          TOKEN=$(printf '%s' "$TOKEN_RESPONSE" | python3 -c "import json,sys; data=json.load(sys.stdin); token=data.get('access_token'); print(token) if token else (print(json.dumps(data), file=sys.stderr), sys.exit(1))")

          APP_RESPONSE_FILE=$(mktemp)
          APP_STATUS=$(curl -sS -o "$APP_RESPONSE_FILE" -w "%{http_code}" \
            "https://graph.microsoft.com/v1.0/applications?\$filter=appId%20eq%20'$APP_ID'&\$select=id,web" \
            -H "Authorization: Bearer $TOKEN")
          if [ "$APP_STATUS" -lt 200 ] || [ "$APP_STATUS" -ge 300 ]; then
            echo "Graph application lookup failed with HTTP $APP_STATUS"
            cat "$APP_RESPONSE_FILE"
            exit 1
          fi

          APP=$(cat "$APP_RESPONSE_FILE")
          OBJECT_ID=$(printf '%s' "$APP" | python3 -c "import json, sys; print(json.load(sys.stdin)['value'][0]['id'])")
          UPDATED=$(printf '%s' "$APP" | python3 -c "import json, os, sys; app=json.load(sys.stdin)['value'][0]; uris=app.get('web', {}).get('redirectUris', []); uris=sorted(set(uris + [os.environ['NEW_URI']])); print(json.dumps(uris))")

          PATCH_RESPONSE_FILE=$(mktemp)
          PATCH_STATUS=$(curl -sS -o "$PATCH_RESPONSE_FILE" -w "%{http_code}" -X PATCH \
            "https://graph.microsoft.com/v1.0/applications/$OBJECT_ID" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"web\":{\"redirectUris\":$UPDATED}}")
          if [ "$PATCH_STATUS" -lt 200 ] || [ "$PATCH_STATUS" -ge 300 ]; then
            echo "Graph redirect registration failed with HTTP $PATCH_STATUS"
            cat "$PATCH_RESPONSE_FILE"
            exit 1
          fi

          echo "Registered: $NEW_URI"

      - name: Copy TLS secret
        run: |
          kubectl get secret wildcard-activor-tls --namespace=activitiesapp -o yaml \
            | sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/' \
            | grep -v '^\s*\(resourceVersion\|uid\|creationTimestamp\|selfLink\):' \
            | kubectl apply -f -

      - name: Create secrets
        run: |
          kubectl create secret generic app-secrets \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
            --from-literal=COSMOS_ENDPOINT='${{ secrets.COSMOS_ENDPOINT }}' \
            --from-literal=COSMOS_KEY='${{ secrets.COSMOS_KEY }}' \
            --from-literal=GOOGLE_MAPS_API_KEY='${{ secrets.GOOGLE_MAPS_API_KEY }}' \
            --from-literal=AZURE_CLIENT_SECRET='${{ secrets.AZURE_CLIENT_SECRET }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy PostgreSQL
        run: |
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/data/postgres-pvc.yaml | kubectl apply -f -
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/data/postgres-dep.yaml | kubectl apply -f -
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/data/postgres-svc.yaml | kubectl apply -f -

      - name: Deploy API
        run: |
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/app/api-dep.yaml | kubectl apply -f -
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/app/api-svc.yaml | kubectl apply -f -

      - name: Deploy Web
        run: |
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/app/web-dep.yaml | kubectl apply -f -
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/app/web-svc.yaml | kubectl apply -f -

      - name: Create PR ingress
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: activitiesapp-web
            namespace: ${{ env.NAMESPACE }}
            annotations:
              nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
              nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
              nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - ${{ env.PR_HOST }}
                secretName: wildcard-activor-tls
            rules:
              - host: ${{ env.PR_HOST }}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: activitiesapp-web
                          port:
                            number: 80
          EOF

      - name: Set deployment images and APP_VERSION
        run: |
          kubectl set image deployment/activitiesapp-api \
            api=${{ env.API_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ env.SHA_TAG }} \
            --namespace=${{ env.NAMESPACE }}
          kubectl set image deployment/activitiesapp-web \
            web=${{ env.WEB_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ env.SHA_TAG }} \
            --namespace=${{ env.NAMESPACE }}
          kubectl set env deployment/activitiesapp-api APP_VERSION=pr-${{ env.PR_NUMBER }}-${{ env.SHA_TAG }} --namespace=${{ env.NAMESPACE }}
          kubectl set env deployment/activitiesapp-web APP_VERSION=pr-${{ env.PR_NUMBER }}-${{ env.SHA_TAG }} --namespace=${{ env.NAMESPACE }}

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/activitiesapp-api --namespace=${{ env.NAMESPACE }} --timeout=120s &
          kubectl rollout status deployment/activitiesapp-web --namespace=${{ env.NAMESPACE }} --timeout=120s &
          wait

      - name: Post PR comment with URL
        run: |
          cat > /tmp/pr-comment.json <<'ENDJSON'
          {
            "body": "**PR Environment deployed!**\n\n**URL:** http://${{ env.PR_HOST }}\n\n**Namespace:** `${{ env.NAMESPACE }}`\n**API Image:** `${{ env.API_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ env.SHA_TAG }}`\n**Web Image:** `${{ env.WEB_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ env.SHA_TAG }}`"
          }
          ENDJSON
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ env.PR_NUMBER }}/comments" \
            -d @/tmp/pr-comment.json

      - name: Post-deploy status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods --namespace=${{ env.NAMESPACE }}
          echo ""
          echo "=== Services ==="
          kubectl get svc --namespace=${{ env.NAMESPACE }}
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress --namespace=${{ env.NAMESPACE }}

  teardown:
    name: Teardown PR Environment
    if: github.event.action == 'closed'
    runs-on: self-hosted
    env:
      NAMESPACE: activitiesapp-pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4

      - name: Set KUBECONFIG
        run: echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Remove redirect URI from Azure AD
        run: |
          set -euo pipefail

          REMOVE_URI="https://pr-${{ env.PR_NUMBER }}.activor.duckdns.org/signin-oidc"
          APP_ID="6d3dc4ee-33ce-4656-95c8-702a38464687"
          export REMOVE_URI

          TOKEN_RESPONSE=$(curl -sS -X POST \
            "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            -d "client_id=${{ secrets.AZURE_CI_CLIENT_ID }}&client_secret=${{ secrets.AZURE_CLIENT_SECRET_CI }}&scope=https://graph.microsoft.com/.default&grant_type=client_credentials")
          TOKEN=$(printf '%s' "$TOKEN_RESPONSE" | python3 -c "import json,sys; data=json.load(sys.stdin); token=data.get('access_token'); print(token) if token else (print(json.dumps(data), file=sys.stderr), sys.exit(1))")

          APP_RESPONSE_FILE=$(mktemp)
          APP_STATUS=$(curl -sS -o "$APP_RESPONSE_FILE" -w "%{http_code}" \
            "https://graph.microsoft.com/v1.0/applications?\$filter=appId%20eq%20'$APP_ID'&\$select=id,web" \
            -H "Authorization: Bearer $TOKEN")
          if [ "$APP_STATUS" -lt 200 ] || [ "$APP_STATUS" -ge 300 ]; then
            echo "Graph application lookup failed with HTTP $APP_STATUS"
            cat "$APP_RESPONSE_FILE"
            exit 1
          fi

          APP=$(cat "$APP_RESPONSE_FILE")
          OBJECT_ID=$(printf '%s' "$APP" | python3 -c "import json, sys; print(json.load(sys.stdin)['value'][0]['id'])")
          UPDATED=$(printf '%s' "$APP" | python3 -c "import json, os, sys; app=json.load(sys.stdin)['value'][0]; uris=app.get('web', {}).get('redirectUris', []); uris=[uri for uri in uris if uri != os.environ['REMOVE_URI']]; print(json.dumps(uris))")

          PATCH_RESPONSE_FILE=$(mktemp)
          PATCH_STATUS=$(curl -sS -o "$PATCH_RESPONSE_FILE" -w "%{http_code}" -X PATCH \
            "https://graph.microsoft.com/v1.0/applications/$OBJECT_ID" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"web\":{\"redirectUris\":$UPDATED}}")
          if [ "$PATCH_STATUS" -lt 200 ] || [ "$PATCH_STATUS" -ge 300 ]; then
            echo "Graph redirect removal failed with HTTP $PATCH_STATUS"
            cat "$PATCH_RESPONSE_FILE"
            exit 1
          fi

          echo "Removed: $REMOVE_URI"

      - name: Delete PR namespace
        run: |
          kubectl delete namespace ${{ env.NAMESPACE }} --ignore-not-found=true

      - name: Post teardown comment
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ env.PR_NUMBER }}/comments" \
            -d '{"body":"**PR Environment torn down.** Namespace `${{ env.NAMESPACE }}` and all resources have been deleted."}'

  notify:
    name: Notify on failure
    needs: [prepare, lint, test, push-api, push-web, deploy]
    if: ${{ github.event.action != 'closed' && always() && contains(join(needs.*.result, ','), 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Send ntfy notification
        run: |
          curl -d "PR Environment pipeline failed for PR #${{ env.PR_NUMBER }}" ntfy.sh/1870b897-74f4-42bf-9d8e-610eb6538929
