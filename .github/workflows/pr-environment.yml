name: PR Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
  API_IMAGE: ${{ secrets.DOCKER_USERNAME }}/activitiesapp-api
  WEB_IMAGE: ${{ secrets.DOCKER_USERNAME }}/activitiesapp-web
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  # ── CI: build → lint → test → push (same gates as deploy.yml) ──

  build:
    name: Build
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Build API
        run: dotnet build src/ActivitiesApp.Api/ActivitiesApp.Api.csproj -c Release

      - name: Build Web
        run: dotnet build src/ActivitiesApp.Web/ActivitiesApp.Web.csproj -c Release

  lint:
    name: Lint
    if: github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint API
        run: |
          docker run \
            --rm \
            -u $(id -u):$(id -g) \
            -e DOTNET_CLI_HOME=/tmp/dotnet-home \
            -e HOME=/tmp \
            -e NUGET_PACKAGES=/tmp/nuget-packages \
            -v .:/app \
            -w /app \
            mcr.microsoft.com/dotnet/sdk:10.0 \
              dotnet format --verify-no-changes src/ActivitiesApp.Api/ActivitiesApp.Api.csproj

      - name: Lint Web
        run: |
          docker run \
            --rm \
            -u $(id -u):$(id -g) \
            -e DOTNET_CLI_HOME=/tmp/dotnet-home \
            -e HOME=/tmp \
            -e NUGET_PACKAGES=/tmp/nuget-packages \
            -v .:/app \
            -w /app \
            mcr.microsoft.com/dotnet/sdk:10.0 \
              dotnet format --verify-no-changes src/ActivitiesApp.Web/ActivitiesApp.Web.csproj

  test:
    name: Test
    if: github.event.action != 'closed'
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Run API unit tests
        run: dotnet test tests/ActivitiesApp.Api.Tests/ActivitiesApp.Api.Tests.csproj --configuration Release --verbosity normal

      - name: Run Infrastructure unit tests
        run: dotnet test tests/ActivitiesApp.Infrastructure.Tests/ActivitiesApp.Infrastructure.Tests.csproj --configuration Release --verbosity normal

  push:
    name: Push Images
    if: github.event.action != 'closed'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute SHA tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push API image
        run: |
          docker build -f src/ActivitiesApp.Api/Dockerfile -t ${{ env.API_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ steps.tag.outputs.sha }} .
          docker push ${{ env.API_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ steps.tag.outputs.sha }}

      - name: Build & push Web image
        run: |
          docker build -f src/ActivitiesApp.Web/Dockerfile -t ${{ env.WEB_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ steps.tag.outputs.sha }} .
          docker push ${{ env.WEB_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ steps.tag.outputs.sha }}

  # ── Deploy PR environment to Kubernetes ──

  deploy:
    name: Deploy PR Environment
    if: github.event.action != 'closed'
    needs: push
    runs-on: self-hosted
    env:
      SHA_TAG: ${{ needs.push.outputs.sha_tag }}
      NAMESPACE: activitiesapp-pr-${{ github.event.pull_request.number }}
      PR_HOST: pr-${{ github.event.pull_request.number }}.activor.duckdns.org
    steps:
      - uses: actions/checkout@v4

      - name: Set KUBECONFIG
        run: echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Verify cluster access
        run: kubectl get nodes

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Create secrets
        run: |
          kubectl create secret generic app-secrets \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
            --from-literal=COSMOS_ENDPOINT='${{ secrets.COSMOS_ENDPOINT }}' \
            --from-literal=COSMOS_KEY='${{ secrets.COSMOS_KEY }}' \
            --from-literal=GOOGLE_MAPS_API_KEY='${{ secrets.GOOGLE_MAPS_API_KEY }}' \
            --from-literal=AZURE_CLIENT_SECRET='${{ secrets.AZURE_CLIENT_SECRET }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy PostgreSQL
        run: |
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/data/postgres-pvc.yaml | kubectl apply -f -
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/data/postgres-dep.yaml | kubectl apply -f -
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/data/postgres-svc.yaml | kubectl apply -f -

      - name: Deploy API
        run: |
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/app/api-dep.yaml | kubectl apply -f -
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/app/api-svc.yaml | kubectl apply -f -

      - name: Deploy Web
        run: |
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/app/web-dep.yaml | kubectl apply -f -
          sed 's/namespace: activitiesapp/namespace: ${{ env.NAMESPACE }}/g' deploy/k8s/app/web-svc.yaml | kubectl apply -f -

      - name: Create PR ingress
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: activitiesapp-web
            namespace: ${{ env.NAMESPACE }}
            annotations:
              nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
              nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
              nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
              nginx.ingress.kubernetes.io/ssl-redirect: "false"
              nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
          spec:
            ingressClassName: nginx
            rules:
              - host: ${{ env.PR_HOST }}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: activitiesapp-web
                          port:
                            number: 80
          EOF

      - name: Set deployment images
        run: |
          kubectl set image deployment/activitiesapp-api \
            api=${{ env.API_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ env.SHA_TAG }} \
            --namespace=${{ env.NAMESPACE }}
          kubectl set image deployment/activitiesapp-web \
            web=${{ env.WEB_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ env.SHA_TAG }} \
            --namespace=${{ env.NAMESPACE }}

      - name: Set APP_VERSION
        run: |
          kubectl set env deployment/activitiesapp-api APP_VERSION=pr-${{ env.PR_NUMBER }}-${{ env.SHA_TAG }} --namespace=${{ env.NAMESPACE }}
          kubectl set env deployment/activitiesapp-web APP_VERSION=pr-${{ env.PR_NUMBER }}-${{ env.SHA_TAG }} --namespace=${{ env.NAMESPACE }}

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/activitiesapp-api --namespace=${{ env.NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/activitiesapp-web --namespace=${{ env.NAMESPACE }} --timeout=120s

      - name: Post PR comment with URL
        run: |
          cat > /tmp/pr-comment.json <<'ENDJSON'
          {
            "body": "**PR Environment deployed!**\n\n**URL:** http://${{ env.PR_HOST }}\n\n**Namespace:** `${{ env.NAMESPACE }}`\n**API Image:** `${{ env.API_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ env.SHA_TAG }}`\n**Web Image:** `${{ env.WEB_IMAGE }}:pr-${{ env.PR_NUMBER }}-${{ env.SHA_TAG }}`"
          }
          ENDJSON
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ env.PR_NUMBER }}/comments" \
            -d @/tmp/pr-comment.json

      - name: Post-deploy status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods --namespace=${{ env.NAMESPACE }}
          echo ""
          echo "=== Services ==="
          kubectl get svc --namespace=${{ env.NAMESPACE }}
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress --namespace=${{ env.NAMESPACE }}

  # ── Teardown on PR close ──

  teardown:
    name: Teardown PR Environment
    if: github.event.action == 'closed'
    runs-on: self-hosted
    env:
      NAMESPACE: activitiesapp-pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4

      - name: Set KUBECONFIG
        run: echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Delete PR namespace
        run: |
          kubectl delete namespace ${{ env.NAMESPACE }} --ignore-not-found=true

      - name: Post teardown comment
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ env.PR_NUMBER }}/comments" \
            -d '{"body":"**PR Environment torn down.** Namespace `${{ env.NAMESPACE }}` and all resources have been deleted."}'

  # ── Failure notification ──

  notify:
    name: Notify on failure
    needs: [build, lint, test, push, deploy]
    if: ${{ always() && contains(join(needs.*.result, ','), 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Send ntfy notification
        run: |
          curl -d "PR Environment pipeline failed for PR #${{ env.PR_NUMBER }}" ntfy.sh/1870b897-74f4-42bf-9d8e-610eb6538929
