name: Kubernetes Build & Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy-master
  cancel-in-progress: true

env:
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
  API_IMAGE: ${{ secrets.DOCKER_USERNAME }}/activitiesapp-api
  WEB_IMAGE: ${{ secrets.DOCKER_USERNAME }}/activitiesapp-web

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute SHA tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'NuGet.Config', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Lint API
        run: dotnet format --verify-no-changes src/ActivitiesApp.Api/ActivitiesApp.Api.csproj

      - name: Lint Web
        run: dotnet format --verify-no-changes src/ActivitiesApp.Web/ActivitiesApp.Web.csproj

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'NuGet.Config', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Run API unit tests
        run: dotnet test tests/ActivitiesApp.Api.Tests/ActivitiesApp.Api.Tests.csproj --configuration Release --verbosity normal

      - name: Run Infrastructure unit tests
        run: dotnet test tests/ActivitiesApp.Infrastructure.Tests/ActivitiesApp.Infrastructure.Tests.csproj --configuration Release --verbosity normal

  push-api:
    name: Push API Image
    needs: [prepare, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ActivitiesApp.Api/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}:${{ needs.prepare.outputs.sha_tag }}
          cache-from: type=gha,scope=activitiesapp-api
          cache-to: type=gha,mode=max,scope=activitiesapp-api

  push-web:
    name: Push Web Image
    needs: [prepare, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ActivitiesApp.Web/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE }}:${{ needs.prepare.outputs.sha_tag }}
          cache-from: type=gha,scope=activitiesapp-web
          cache-to: type=gha,mode=max,scope=activitiesapp-web

  cd:
    name: Deploy to Kubernetes
    needs: [prepare, push-api, push-web]
    runs-on: self-hosted
    env:
      SHA_TAG: ${{ needs.prepare.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set KUBECONFIG
        run: echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Verify cluster access
        run: kubectl get nodes

      - name: Apply namespace
        run: kubectl apply -f deploy/k8s/base/namespace.yaml

      - name: Create/update secrets
        run: |
          kubectl create secret generic app-secrets \
            --namespace=activitiesapp \
            --from-literal=POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
            --from-literal=COSMOS_ENDPOINT='${{ secrets.COSMOS_ENDPOINT }}' \
            --from-literal=COSMOS_KEY='${{ secrets.COSMOS_KEY }}' \
            --from-literal=GOOGLE_MAPS_API_KEY='${{ secrets.GOOGLE_MAPS_API_KEY }}' \
            --from-literal=AZURE_CLIENT_SECRET='${{ secrets.AZURE_CLIENT_SECRET }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          kubectl apply -f deploy/k8s/base
          kubectl apply -f deploy/k8s/data
          kubectl apply -f deploy/k8s/app
          kubectl apply -f deploy/k8s/observability

      - name: Restart Grafana to pick up ConfigMap changes
        run: kubectl rollout restart deployment/grafana --namespace=activitiesapp

      - name: Install k6
        run: nix-env -iA nixpkgs.k6

      - name: Rolling deploy with smoke test
        run: |
          kubectl port-forward svc/activitiesapp-api 18080:8080 --namespace=activitiesapp &
          PF_API_PID=$!
          kubectl port-forward svc/prometheus 19090:9090 --namespace=activitiesapp &
          PF_PROM_PID=$!
          sleep 3

          K6_PROMETHEUS_RW_SERVER_URL=http://localhost:19090/api/v1/write \
          k6 run \
            --out experimental-prometheus-rw \
            --env WEB_URL=https://activor.duckdns.org \
            --env API_URL=http://localhost:18080 \
            deploy/k6/smoke-test.js &
          K6_PID=$!
          sleep 10

          kubectl set image deployment/activitiesapp-api \
            api=${{ env.API_IMAGE }}:${{ env.SHA_TAG }} \
            --namespace=activitiesapp
          kubectl set image deployment/activitiesapp-web \
            web=${{ env.WEB_IMAGE }}:${{ env.SHA_TAG }} \
            --namespace=activitiesapp
          kubectl set env deployment/activitiesapp-api APP_VERSION=${{ env.SHA_TAG }} --namespace=activitiesapp
          kubectl set env deployment/activitiesapp-web APP_VERSION=${{ env.SHA_TAG }} --namespace=activitiesapp

          kubectl rollout status deployment/activitiesapp-api --namespace=activitiesapp --timeout=120s &
          kubectl rollout status deployment/activitiesapp-web --namespace=activitiesapp --timeout=120s &
          wait

          wait $K6_PID
          K6_EXIT=$?

          kill $PF_API_PID $PF_PROM_PID || true

          exit $K6_EXIT

      - name: Post-deploy status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods --namespace=activitiesapp
          echo ""
          echo "=== Services ==="
          kubectl get svc --namespace=activitiesapp
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress --namespace=activitiesapp
          echo ""
          echo "=== Events (last 5 min) ==="
          kubectl get events --namespace=activitiesapp --sort-by='.lastTimestamp' | tail -20

  notify:
    name: Notify on failure
    needs: [prepare, lint, test, push-api, push-web, cd]
    if: ${{ always() && contains(join(needs.*.result, ','), 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Send ntfy notification
        run: |
          curl -d "Kubernetes pipeline failed" ntfy.sh/1870b897-74f4-42bf-9d8e-610eb6538929
