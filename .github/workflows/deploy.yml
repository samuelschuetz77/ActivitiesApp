name: Build and Deploy to Kubernetes

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.sha.outputs.sha_short }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ActivitiesApp.Api/Dockerfile
          push: true
          tags: samuelschuetz77/activitiesapp-api:${{ steps.sha.outputs.sha_short }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ActivitiesApp/ActivitiesApp.Web/Dockerfile
          push: true
          tags: samuelschuetz77/activitiesapp-web:${{ steps.sha.outputs.sha_short }}

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Runner diagnostics
        run: |
          set -euxo pipefail
          whoami
          id
          pwd
          hostname
          echo "KUBECONFIG=$KUBECONFIG"
          ls -ld /etc/rancher /etc/rancher/k3s
          ls -l "$KUBECONFIG"
          test -r "$KUBECONFIG"
          kubectl version --client
          kubectl config current-context
          kubectl get nodes -o wide

      - name: Apply Kubernetes manifests
        run: |
          set -euxo pipefail
          kubectl apply -f k8s/

      - name: Update API image
        run: |
          set -euxo pipefail
          kubectl set image deployment/activitiesapp-api \
            activitiesapp-api=samuelschuetz77/activitiesapp-api:${{ needs.build-and-push.outputs.sha_short }} \
            -n sam-cael-final

      - name: Update Web image
        run: |
          set -euxo pipefail
          kubectl set image deployment/activitiesapp-web \
            activitiesapp-web=samuelschuetz77/activitiesapp-web:${{ needs.build-and-push.outputs.sha_short }} \
            -n sam-cael-final

      - name: Wait for rollout
        run: |
          set -euxo pipefail
          kubectl rollout status deployment/activitiesapp-api -n sam-cael-final --timeout=120s
          kubectl rollout status deployment/activitiesapp-web -n sam-cael-final --timeout=120s

      - name: Post-deploy status
        if: always()
        run: |
          set -x
          kubectl get all -n sam-cael-final || true
          kubectl get ingress -n sam-cael-final || true
          kubectl get events -n sam-cael-final --sort-by=.lastTimestamp | tail -n 50 || true
