# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: API Build and deploy 

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build src/ActivitiesApp.Api/ActivitiesApp.Api.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish src/ActivitiesApp.Api/ActivitiesApp.Api.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C4ABD68989B24529B8A7363FD6EE1953 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A3AA252FCD2D49218426468A7B4D0079 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C2BE5F6BA5954F7482D04ADC8645E288 }}

      - name: Resolve Azure Web App resource group
        id: resolve-rg
        run: |
          RG=$(az webapp list --query "[?name=='Activities-API'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then
            echo "Failed to resolve resource group for Activities-API" >&2
            exit 1
          fi
          echo "resource_group=$RG" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Activities-API'
          slot-name: 'Production'
          package: .

      - name: Configure Azure App Service OTEL settings
        run: |
          az webapp config appsettings set \
            --name Activities-API \
            --resource-group "${{ steps.resolve-rg.outputs.resource_group }}" \
            --settings \
              OTEL_EXPORTER_OTLP_ENDPOINT="https://otlp.activor.duckdns.org" \
              OTEL_EXPORTER_OTLP_PROTOCOL="http/protobuf" \
              OTEL_SERVICE_NAME="activitiesapp-api" \
              OTEL_RESOURCE_ATTRIBUTES="deployment.environment=azure,service.namespace=activitiesapp"
          
