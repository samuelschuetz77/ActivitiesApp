<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ActivitiesApp</title>
    <base href="/" />
    <link rel="stylesheet" href="_content/ActivitiesApp.Shared/lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="_content/ActivitiesApp.Shared/app.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="ActivitiesApp.styles.css" />
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

    <script>
        window.getUserLocation = () => {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject('Geolocation not supported');
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    pos => resolve([pos.coords.latitude, pos.coords.longitude]),
                    err => reject(err.message),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        };

        window.addRecentlyViewed = (id) => {
            let items = JSON.parse(localStorage.getItem('recentlyViewed') || '[]');
            items = items.filter(i => i !== id);
            items.unshift(id);
            if (items.length > 3) items = items.slice(0, 3);
            localStorage.setItem('recentlyViewed', JSON.stringify(items));
        };

        window.getRecentlyViewed = () => {
            return JSON.parse(localStorage.getItem('recentlyViewed') || '[]');
        };
    </script>

</body>

</html>
