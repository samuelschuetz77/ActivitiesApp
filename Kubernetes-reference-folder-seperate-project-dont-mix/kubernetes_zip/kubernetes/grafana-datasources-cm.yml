apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: cael
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
        - name: loki
          type: loki
          access: proxy
          url: http://loki:3100
          isDefault: true
          editable: false

        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
