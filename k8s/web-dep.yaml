apiVersion: apps/v1
kind: Deployment
metadata:
  name: activitiesapp-web
  namespace: activitiesapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: activitiesapp-web
  template:
    metadata:
      labels:
        app: activitiesapp-web
    spec:
      containers:
        - name: web
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ApiAddress
              value: "http://activitiesapp-api:8080"
            - name: APP_VERSION
              value: "dev"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/version
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/version
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
