apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: activitiesapp-web
  namespace: sam-cael-final
spec:
  ingressClassName: nginx
  rules:
  - host: activor.duckdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: activitiesapp-web
            port:
              number: 80
