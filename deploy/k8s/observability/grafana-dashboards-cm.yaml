apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: activitiesapp
data:
  activitiesapp-observability-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le, service_name, http_route) (rate(http_server_request_duration_seconds_bucket{service_name=~\"activitiesapp-(api|web)\", http_route!=\"\"}[5m])))",
              "legendFormat": "{{service_name}} {{http_route}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Application Performance: P95 Latency by Route",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (service_name, http_response_status_code) (rate(http_server_request_duration_seconds_count{service_name=~\"activitiesapp-(api|web)\", http_response_status_code=~\"2..|4..|5..\"}[5m]))",
              "legendFormat": "{{service_name}} {{http_response_status_code}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "API Response Success Rate by Status Code",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "description": "Critical error logs only. Warnings are excluded.",
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "{service_name=~\"activitiesapp-(api|web)\", detected_level=~\"(?i)(error|critical|fatal)\"}",
              "queryType": "range",
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "{service_name=~\"activitiesapp-(api|web)\"} |~ \"(?i)(critical|fatal|exception|failure|failed|panic|error)\"",
              "queryType": "range",
              "refId": "B"
            }
          ],
          "title": "Critical Errors",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 8,
            "y": 16
          },
          "id": 4,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "{service_name=~\"activitiesapp-(api|web)\", detected_level=~\"(?i)(warn|warning)\"}",
              "queryType": "range",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "{service_name=~\"activitiesapp-(api|web)\"} |~ \"(?i)(warn|warning)\"",
              "queryType": "range",
              "refId": "B"
            }
          ],
          "title": "Warnings",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "fillOpacity": 20,
              "max": 25,
              "min": 0,
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 8
          },
          "id": 6,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (creation_source) (increase(activities_created_total{service_name=\"activitiesapp-api\"}[1h]))",
              "legendFormat": "{{creation_source}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Activity Creation Rate per Hour",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 26 },
          "id": 20,
          "title": "Google API Usage",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "#6aa84f", "value": null },
                  { "color": "#f1c232", "value": 10 },
                  { "color": "#cc4125", "value": 25 }
                ]
              },
              "unit": "none",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 27 },
          "id": 7,
          "options": {
            "displayMode": "gradient",
            "namePlacement": "left",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showUnfilled": true,
            "text": {}
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (deployment_environment, api_type) (increase(google_api_requests_total{deployment_environment=~\"$google_environment\", api_type=~\"$google_api_type\"}[$__range]))",
              "instant": true,
              "legendFormat": "{{deployment_environment}} {{api_type}}",
              "refId": "A"
            }
          ],
          "title": "Google API Requests by Environment",
          "type": "bargauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "pointSize": 4,
                "showPoints": "auto",
                "fillOpacity": 12
              },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 34 },
          "id": 8,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true,
              "calcs": ["lastNotNull", "max"]
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (deployment_environment, api_type) (increase(google_api_requests_total{deployment_environment=~\"$google_environment\", api_type=~\"$google_api_type\"}[$__interval]))",
              "legendFormat": "{{deployment_environment}} {{api_type}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Google API Request Trend",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 44 },
          "id": 100,
          "title": "k6",
          "type": "row"
        },
        {
          "id": 101,
          "title": "Requests per Second",
          "description": "Should stay at ~100 RPS throughout the rollout. Any drop indicates a routing gap.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 45, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(k6_http_reqs_total[15s]))",
              "legendFormat": "RPS"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 80 },
                  { "color": "green", "value": 95 }
                ]
              }
            }
          }
        },
        {
          "id": 102,
          "title": "Error Rate",
          "description": "Percentage of requests returning 5xx. Should be 0% throughout — any blip is a downtime event.",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 45, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(k6_http_req_failed_total[15s])) / sum(rate(k6_http_reqs_total[15s])) * 100",
              "legendFormat": "Error %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.1 }
                ]
              }
            }
          }
        },
        {
          "id": 103,
          "title": "Latency — p95",
          "description": "p95 response time. A spike here during the rollout indicates pods draining slowly.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 53, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum(rate(k6_http_req_duration_bucket[15s])) by (le))",
              "legendFormat": "p95"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum(rate(k6_http_req_duration_bucket[15s])) by (le))",
              "legendFormat": "p50"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 500 },
                  { "color": "red", "value": 2000 }
                ]
              }
            }
          }
        },
        {
          "id": 104,
          "title": "Active VUs",
          "description": "Virtual users k6 is running. Ramps to 50 at peak — if VUs spike toward maxVUs (100) it means responses are slow.",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 53, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "k6_vus",
              "legendFormat": "VUs"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 75 },
                  { "color": "red", "value": 90 }
                ]
              }
            }
          }
        },
        {
          "id": 105,
          "title": "Dropped Requests (this range)",
          "description": "Total failed HTTP responses in the selected time range. For a zero-downtime deploy this should read 0.",
          "type": "stat",
          "gridPos": { "x": 0, "y": 61, "w": 12, "h": 6 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(k6_http_req_failed_total[$__range]))",
              "legendFormat": "failures"
            }
          ],
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "value"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "noValue": "0",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 106,
          "title": "Total Requests (this range)",
          "description": "Total requests k6 sent in the selected range. Pairs with the failures count — e.g. 0 failures out of 14,000 requests means a clean deploy.",
          "type": "stat",
          "gridPos": { "x": 12, "y": 61, "w": 12, "h": 6 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(k6_http_reqs_total[$__range]))",
              "legendFormat": "requests"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "value"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "noValue": "0",
              "color": { "mode": "fixed", "fixedColor": "blue" }
            }
          }
        },
        {
          "id": 107,
          "title": "Dropped Requests Over Time",
          "description": "Per-30s bucket of failed requests. Any non-zero bar marks the moment packets were dropped — correlate the timestamp with the rollout log to find which pod transition caused it.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 67, "w": 24, "h": 9 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(k6_http_req_failed_total[30s]))",
              "legendFormat": "failures / 30s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 70,
                "lineWidth": 1
              },
              "color": { "mode": "fixed", "fixedColor": "red" }
            }
          }
        },
        {
          "id": 108,
          "title": "Requests vs Failures Over Time",
          "description": "Both series on the same panel. Healthy deploy = green line flat at target RPS, red line flat at zero throughout the rollout window.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 76, "w": 24, "h": 9 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(k6_http_reqs_total[30s]))",
              "legendFormat": "requests/s"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(k6_http_req_failed_total[30s]))",
              "legendFormat": "failures/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "failures/s" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "requests/s" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ]
              }
            ]
          }
        }
      ],
      "refresh": "5s",
      "schemaVersion": 41,
      "tags": [
        "activitiesapp",
        "observability"
      ],
      "templating": {
        "list": [
          {
            "allValue": ".*",
            "current": {
              "selected": true,
              "text": ["All"],
              "value": ["$__all"]
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(google_api_requests_total, deployment_environment)",
            "includeAll": true,
            "label": "Environment",
            "multi": true,
            "name": "google_environment",
            "options": [],
            "query": {
              "qryType": 1,
              "query": "label_values(google_api_requests_total, deployment_environment)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          },
          {
            "allValue": ".*",
            "current": {
              "selected": true,
              "text": ["All"],
              "value": ["$__all"]
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(google_api_requests_total, api_type)",
            "includeAll": true,
            "label": "Request Type",
            "multi": true,
            "name": "google_api_type",
            "options": [],
            "query": {
              "qryType": 1,
              "query": "label_values(google_api_requests_total, api_type)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now/d",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "ActivitiesApp Observability",
      "uid": "activitiesapp-observability",
      "version": 3
    }
