apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: activitiesapp
data:
  activitiesapp-observability-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le, service_name, http_route) (rate(http_server_request_duration_seconds_bucket{service_name=~\"activitiesapp-(api|web)\", http_route!=\"\"}[5m])))",
              "legendFormat": "{{service_name}} {{http_route}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Application Performance: P95 Latency by Route",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (service_name, http_response_status_code) (rate(http_server_request_duration_seconds_count{service_name=~\"activitiesapp-(api|web)\", http_response_status_code=~\"2..|4..|5..\"}[5m]))",
              "legendFormat": "{{service_name}} {{http_response_status_code}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "API Response Success Rate by Status Code",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (service_name, detected_level) (count_over_time({service_name=~\"activitiesapp-(api|web)\", detected_level=~\"[Ww][Aa][Rr][Nn].*|[Ee][Rr][Rr][Oo][Rr]\"}[5m]))",
              "legendFormat": "{{service_name}} {{detected_level}}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Error Count and Warnings",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "fillOpacity": 20,
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 16,
            "x": 8,
            "y": 8
          },
          "id": 4,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (creation_source) (increase(activities_created_total{service_name=\"activitiesapp-api\"}[1h]))",
              "legendFormat": "{{creation_source}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Activity Creation Rate per Hour",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "id": 5,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "{service_name=~\"activitiesapp-(api|web)\", detected_level=~\"[Ww][Aa][Rr][Nn].*|[Ee][Rr][Rr][Oo][Rr]\"}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Recent Error Messages",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "id": 6,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "{service_name=~\"activitiesapp-(api|web)\"}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Near Real-Time Logs",
          "type": "logs"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 26 },
          "id": 20,
          "title": "Google API Usage",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "#6aa84f", "value": null },
                  { "color": "#f1c232", "value": 10 },
                  { "color": "#cc4125", "value": 25 }
                ]
              },
              "unit": "none",
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 27 },
          "id": 7,
          "options": {
            "displayMode": "gradient",
            "namePlacement": "left",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showUnfilled": true,
            "text": {}
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (deployment_environment, api_type) (increase(google_api_requests_total{deployment_environment=~\"$google_environment\", api_type=~\"$google_api_type\"}[$__range]))",
              "instant": true,
              "legendFormat": "{{deployment_environment}} {{api_type}}",
              "refId": "A"
            }
          ],
          "title": "Google API Requests by Environment",
          "type": "bargauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "pointSize": 4,
                "showPoints": "auto",
                "fillOpacity": 12
              },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 34 },
          "id": 8,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true,
              "calcs": ["lastNotNull", "max"]
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (deployment_environment, api_type) (increase(google_api_requests_total{deployment_environment=~\"$google_environment\", api_type=~\"$google_api_type\"}[$__interval]))",
              "legendFormat": "{{deployment_environment}} {{api_type}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Google API Request Trend",
          "type": "timeseries"
        }
      ],
      "refresh": "5s",
      "schemaVersion": 41,
      "tags": [
        "activitiesapp",
        "observability"
      ],
      "templating": {
        "list": [
          {
            "allValue": ".*",
            "current": {
              "selected": true,
              "text": ["All"],
              "value": ["$__all"]
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(google_api_requests_total, deployment_environment)",
            "includeAll": true,
            "label": "Environment",
            "multi": true,
            "name": "google_environment",
            "options": [],
            "query": {
              "qryType": 1,
              "query": "label_values(google_api_requests_total, deployment_environment)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          },
          {
            "allValue": ".*",
            "current": {
              "selected": true,
              "text": ["All"],
              "value": ["$__all"]
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(google_api_requests_total, api_type)",
            "includeAll": true,
            "label": "Request Type",
            "multi": true,
            "name": "google_api_type",
            "options": [],
            "query": {
              "qryType": 1,
              "query": "label_values(google_api_requests_total, api_type)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now/d",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "ActivitiesApp Observability",
      "uid": "activitiesapp-observability",
      "version": 3
    }
