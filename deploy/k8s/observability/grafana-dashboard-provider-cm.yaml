apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: activitiesapp
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: activitiesapp
        orgId: 1
        folder: ActivitiesApp
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
