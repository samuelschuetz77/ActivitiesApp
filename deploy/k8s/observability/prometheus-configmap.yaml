apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: activitiesapp
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["prometheus:9090"]

      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector:8889"]

      - job_name: uptime-kuma
        scrape_interval: 30s
        static_configs:
          - targets: ["uptime-kuma:3001"]
        metrics_path: /metrics
        basic_auth:
          username: api
          password_file: /etc/prometheus/secrets/uptime-kuma-password
