apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-k6-dashboard
  namespace: activitiesapp
data:
  k6-zdd-dashboard.json: |
    {
      "title": "k6 — Zero Downtime Deploy",
      "uid": "k6-zdd",
      "schemaVersion": 38,
      "refresh": "5s",
      "time": { "from": "now-10m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Requests per Second",
          "description": "Should stay at ~100 RPS throughout the rollout. Any drop indicates a routing gap.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(k6_http_reqs_total[15s]))",
              "legendFormat": "RPS"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 80 },
                  { "color": "green", "value": 95 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Error Rate",
          "description": "Percentage of requests returning 5xx. Should be 0% throughout — any blip is a downtime event.",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(k6_http_req_failed_total[15s])) / sum(rate(k6_http_reqs_total[15s])) * 100",
              "legendFormat": "Error %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.1 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Latency — p95",
          "description": "p95 response time. A spike here during the rollout indicates pods draining slowly.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum(rate(k6_http_req_duration_bucket[15s])) by (le))",
              "legendFormat": "p95"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum(rate(k6_http_req_duration_bucket[15s])) by (le))",
              "legendFormat": "p50"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 500 },
                  { "color": "red", "value": 2000 }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Active VUs",
          "description": "Virtual users k6 is running. Ramps to 30 at peak — if VUs spike toward maxVUs (60) it means responses are slow.",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "k6_vus",
              "legendFormat": "VUs"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 45 },
                  { "color": "red", "value": 55 }
                ]
              }
            }
          }
        }
      ]
    }
