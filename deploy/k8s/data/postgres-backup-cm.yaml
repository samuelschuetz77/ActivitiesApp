apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-script-config
  namespace: activitiesapp
data:
  backup.sh: |
    #!/bin/sh
    set -e

    apt-get update -qq && apt-get install -y curl -qq

    FILENAME="backup-$(date +%F-%H%M%S).sql"

    echo "Starting pg_dump..."
    pg_dump -h "$PG_HOST" -U "$PG_USER" "$PG_DATABASE" > /tmp/"$FILENAME"

    echo "Uploading to Azure Blob..."
    curl -v -X PUT \
      -H "x-ms-blob-type: BlockBlob" \
      -H "x-ms-date: $(date -u '+%a, %d %b %Y %T GMT')" \
      -H "Content-Type: application/octet-stream" \
      --data-binary @/tmp/"$FILENAME" \
      "https://${STORAGE_ACCOUNT}.blob.core.windows.net/${STORAGE_CONTAINER}/${FILENAME}?${SAS_TOKEN}"

    echo "Backup complete: $FILENAME"
    rm /tmp/"$FILENAME"

    echo "Pruning old backups (keep 4)..."
    BLOBS=$(curl -s "https://${STORAGE_ACCOUNT}.blob.core.windows.net/${STORAGE_CONTAINER}?restype=container&comp=list&${SAS_TOKEN}" \
      | grep -o '<Name>[^<]*</Name>' | sed 's/<[^>]*>//g' | sort)
    COUNT=$(echo "$BLOBS" | wc -l | tr -d ' ')
    echo "Found $COUNT backups."
    if [ "$COUNT" -gt 4 ]; then
      DELETE_COUNT=$((COUNT - 4))
      echo "$BLOBS" | head -n "$DELETE_COUNT" | while read -r BLOB; do
        echo "Deleting $BLOB..."
        curl -f -X DELETE "https://${STORAGE_ACCOUNT}.blob.core.windows.net/${STORAGE_CONTAINER}/${BLOB}?${SAS_TOKEN}"
      done
    fi
    echo "Pruning done."
