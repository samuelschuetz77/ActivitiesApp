apiVersion: batch/v1
kind: Job
metadata:
  name: db-restore
  namespace: activitiesapp
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: restore-worker
          image: postgres:16.4
          command: ["/bin/sh", "/scripts/restore.sh"]
          env:
            - name: PG_HOST
              value: "postgres"
            - name: PG_USER
              value: "activitiesapp"
            - name: PG_DATABASE
              value: "activitiesdb"
            - name: BACKUP_FILE
              value: "BACKUP_FILE_PLACEHOLDER"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: STORAGE_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: backup-secrets
                  key: STORAGE_ACCOUNT
            - name: STORAGE_CONTAINER
              valueFrom:
                secretKeyRef:
                  name: backup-secrets
                  key: STORAGE_CONTAINER
            - name: SAS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backup-secrets
                  key: SAS_TOKEN
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: script-vol
              mountPath: /scripts
      volumes:
        - name: script-vol
          configMap:
            name: restore-script-config
