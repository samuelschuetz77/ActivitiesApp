apiVersion: apps/v1
kind: Deployment
metadata:
  name: activitiesapp-web
  namespace: activitiesapp
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: activitiesapp-web
  template:
    metadata:
      labels:
        app: activitiesapp-web
    spec:
      terminationGracePeriodSeconds: 45
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: activitiesapp-web
                topologyKey: kubernetes.io/hostname
      containers:
        - name: web
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ApiAddress
              value: "http://activitiesapp-api:8080"
            - name: AzureAd__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AZURE_CLIENT_SECRET
            - name: APP_VERSION 
              value: "dev"
            - name: OTEL_SERVICE_NAME
              value: activitiesapp-web
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=kubernetes,service.namespace=activitiesapp
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /alive
              port: 8080
            failureThreshold: 12
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: dp-keys
              mountPath: /data-protection-keys
      volumes:
        - name: dp-keys
          persistentVolumeClaim:
            claimName: web-dp-keys-pvc
