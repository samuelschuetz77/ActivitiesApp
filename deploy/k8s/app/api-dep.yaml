apiVersion: apps/v1
kind: Deployment
metadata:
  name: activitiesapp-api
  namespace: activitiesapp
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: activitiesapp-api
  template:
    metadata:
      labels:
        app: activitiesapp-api
    spec:
      terminationGracePeriodSeconds: 45
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: activitiesapp-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: DATABASE_PROVIDER
              value: Postgres
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_DB
              value: activitiesdb
            - name: POSTGRES_USER
              value: activitiesapp
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: CosmosDb__Endpoint
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COSMOS_ENDPOINT
            - name: CosmosDb__Key
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COSMOS_KEY
            - name: GoogleMaps__ApiKey
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GOOGLE_MAPS_API_KEY
            - name: APP_VERSION
              value: "dev"
            - name: OTEL_SERVICE_NAME
              value: activitiesapp-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=kubernetes,service.namespace=activitiesapp
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /alive
              port: 8080
            failureThreshold: 12
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
