apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: activitiesapp
spec:
  activeDeadlineSeconds: 120
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: MIGRATE_IMAGE_PLACEHOLDER
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_DB
              value: activitiesdb
            - name: POSTGRES_USER
              value: activitiesapp
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
