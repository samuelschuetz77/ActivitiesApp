apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-renewer
  namespace: activitiesapp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-renewer
  namespace: activitiesapp
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["apex-activor-tls", "wildcard-activor-tls"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-renewer
  namespace: activitiesapp
subjects:
  - kind: ServiceAccount
    name: cert-renewer
    namespace: activitiesapp
roleRef:
  kind: Role
  name: cert-renewer
  apiGroup: rbac.authorization.k8s.io
