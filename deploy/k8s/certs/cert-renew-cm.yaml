apiVersion: v1
kind: ConfigMap
metadata:
  name: cert-renew-script-config
  namespace: activitiesapp
data:
  renew.sh: |
    #!/bin/sh
    set -eu

    APEX="activor.duckdns.org"
    WILDCARD="*.activor.duckdns.org"
    EMAIL="samuel.schuetz6@gmail.com"
    CERT_NAME="activor"
    LIVE_DIR="/etc/letsencrypt/live/${CERT_NAME}"
    NS="activitiesapp"

    echo "[1/5] Installing tools..."
    apk add --no-cache curl openssl ca-certificates >/dev/null
    pip install --quiet --no-cache-dir certbot certbot-dns-duckdns

    echo "[2/5] Downloading kubectl..."
    KUBECTL_VER=$(curl -sL https://dl.k8s.io/release/stable.txt)
    curl -sLO "https://dl.k8s.io/release/${KUBECTL_VER}/bin/linux/amd64/kubectl"
    chmod +x kubectl
    mv kubectl /usr/local/bin/

    echo "[3/5] Writing DuckDNS credentials file..."
    CREDS=/tmp/duckdns.ini
    printf 'dns_duckdns_token = %s\n' "$DUCKDNS_TOKEN" > "$CREDS"
    chmod 600 "$CREDS"

    echo "[4/5] Running certbot (DNS-01 via DuckDNS, single SAN cert)..."
    certbot certonly \
      --non-interactive --agree-tos --email "$EMAIL" \
      --authenticator dns-duckdns \
      --dns-duckdns-credentials "$CREDS" \
      --dns-duckdns-propagation-seconds 60 \
      --cert-name "$CERT_NAME" \
      --keep-until-expiring \
      -d "$APEX" -d "$WILDCARD"

    FULLCHAIN="${LIVE_DIR}/fullchain.pem"
    PRIVKEY="${LIVE_DIR}/privkey.pem"
    if [ ! -s "$FULLCHAIN" ] || [ ! -s "$PRIVKEY" ]; then
      echo "ERROR: cert files missing at ${LIVE_DIR}" >&2
      exit 1
    fi

    echo "[5/5] Patching TLS secrets in namespace ${NS}..."
    for SECRET in apex-activor-tls wildcard-activor-tls; do
      kubectl create secret tls "$SECRET" \
        --namespace="$NS" \
        --cert="$FULLCHAIN" --key="$PRIVKEY" \
        --dry-run=client -o yaml | kubectl apply -f -
    done

    echo "Done. New cert NotAfter:"
    openssl x509 -in "$FULLCHAIN" -noout -enddate
