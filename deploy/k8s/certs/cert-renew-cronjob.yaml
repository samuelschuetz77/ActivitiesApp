apiVersion: batch/v1
kind: CronJob
metadata:
  name: cert-renew
  namespace: activitiesapp
spec:
  schedule: "18 14 * * 3"
  timeZone: "America/Denver"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: cert-renewer
          restartPolicy: Never
          containers:
            - name: cert-renewer
              image: python:3.12-alpine
              command: ["/bin/sh", "/scripts/renew.sh"]
              env:
                - name: DUCKDNS_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: duckdns-secret
                      key: DUCKDNS_TOKEN
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              volumeMounts:
                - name: script-vol
                  mountPath: /scripts
          volumes:
            - name: script-vol
              configMap:
                name: cert-renew-script-config
