services:
  postgres:
    image: postgres:16.4
    container_name: activitiesapp-postgres
    environment:
      POSTGRES_DB: activitiesdb
      POSTGRES_USER: activitiesapp
      POSTGRES_PASSWORD: activitiesapp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U activitiesapp -d activitiesdb"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.1
    container_name: activitiesapp-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      loki:
        condition: service_started
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
      - "13133:13133"
    volumes:
      - ./observability/local/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: activitiesapp-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      otel-collector:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./observability/local/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:3.4.2
    container_name: activitiesapp-loki
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/local/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki

  grafana:
    image: grafana/grafana:12.0.2
    container_name: activitiesapp-grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: "light"
    ports:
      - "3000:3000"
    volumes:
      - ./observability/local/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./observability/local/grafana-dashboard-provider.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./observability/local/activitiesapp-observability-dashboard.json:/var/lib/grafana/dashboards/activitiesapp-observability-dashboard.json:ro

  api:
    build:
      context: ..
      dockerfile: src/ActivitiesApp.Api/Dockerfile
    container_name: activitiesapp-api
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DATABASE_PROVIDER: Postgres
      POSTGRES_HOST: postgres
      POSTGRES_DB: activitiesdb
      POSTGRES_USER: activitiesapp
      POSTGRES_PASSWORD: activitiesapp
      CosmosDb__Endpoint: https://localhost:8081/
      CosmosDb__Key: local-dev-placeholder
      GoogleMaps__ApiKey: local-dev-placeholder
      APP_VERSION: compose-local
      OTEL_SERVICE_NAME: activitiesapp-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=compose,service.namespace=activitiesapp
  web:
    build:
      context: ..
      dockerfile: src/ActivitiesApp.Web/Dockerfile
    container_name: activitiesapp-web
    depends_on:
      api:
        condition: service_started
      otel-collector:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ApiAddress: http://api:8080
      APP_VERSION: compose-local
      OTEL_SERVICE_NAME: activitiesapp-web
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=compose,service.namespace=activitiesapp
    ports:
      - "8081:8080"

volumes:
  postgres-data:
  prometheus-data:
  loki-data:
