global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: uptime-kuma
    scrape_interval: 30s
    scheme: https
    static_configs:
      - targets: ["uptime.activor.duckdns.org"]
    metrics_path: /metrics
    authorization:
      credentials: $UPTIME_KUMA_API_KEY
